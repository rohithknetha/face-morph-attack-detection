<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FaceMorph Attack Detection</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
        }

        #drop-area {
            border: 3px dashed #fff;
            border-radius: 15px;
            padding: 40px;
            width: 80%;
            max-width: 500px;
            text-align: center;
            transition: 0.3s;
            background-color: rgba(255, 255, 255, 0.05);
        }

        #drop-area.highlight {
            border-color: #00ff87;
            background-color: rgba(0, 0, 0, 0.2);
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 10px 25px;
            color: white;
            background-color: #1f88e5;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 20px 0;
        }

        .custom-file-upload:hover {
            background-color: #0b61b4;
        }

        button {
            padding: 10px 25px;
            background-color: #00c3ff;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #00a0cc;
        }

        #filename {
            margin-top: 10px;
            font-size: 14px;
            font-style: italic;
            color: #00ff87;
            transition: 0.3s ease;
        }

        .progress-bar {
            margin-top: 20px;
            background-color: #444;
            height: 12px;
            width: 100%;
            border-radius: 5px;
            overflow: hidden;
            display: none;
        }

        .progress {
            height: 100%;
            width: 0%;
            background-color: #00ff87;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <h1>🎭 Upload a Video for FaceMorph Detection</h1>

    <form id="upload-form" action="/predict" method="post" enctype="multipart/form-data">
        <div id="drop-area">
            <label for="video" class="custom-file-upload">📁 Choose Video</label>
            <input id="video" name="video" type="file" accept="video/*" required>
            <div id="filename">No video selected</div>
            <br>
            <button type="submit">🚀 Detect FaceMorph</button>

            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
    </form>

    <script>
        const dropArea = document.getElementById("drop-area");
        const input = document.getElementById("video");
        const filenameDisplay = document.getElementById("filename");

        ['dragenter', 'dragover'].forEach(event => {
            dropArea.addEventListener(event, e => {
                e.preventDefault();
                e.stopPropagation();
                dropArea.classList.add("highlight");
            });
        });

        ['dragleave', 'drop'].forEach(event => {
            dropArea.addEventListener(event, e => {
                e.preventDefault();
                e.stopPropagation();
                dropArea.classList.remove("highlight");
            });
        });

        dropArea.addEventListener("drop", e => {
            const files = e.dataTransfer.files;
            input.files = files;
            updateFileName(files[0].name);
        });

        input.addEventListener("change", () => {
            if (input.files.length > 0) {
                updateFileName(input.files[0].name);
            }
        });

        function updateFileName(name) {
            filenameDisplay.textContent = `✅ Video Selected: ${name}`;
        }

        document.getElementById("upload-form").addEventListener("submit", function(e) {
            const progressBar = document.getElementById("progressBar");
            const progress = document.getElementById("progress");
            progressBar.style.display = "block";

            let percent = 0;
            const interval = setInterval(() => {
                percent += 5;
                progress.style.width = percent + "%";
                if (percent >= 100) clearInterval(interval);
            }, 100);
        });
    </script>
</body>
</html>
